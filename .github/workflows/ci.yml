name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # --max-warnings=0 so regressions like render-blocking font tags fail the
      # build instead of landing as warnings nobody reads. Runs across every
      # workspace that defines the script.
      - run: npm run lint

      - run: npm run typecheck

      - run: npm run build
